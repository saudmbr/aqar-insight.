<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060D1C"/>
      <stop offset="100%" stop-color="#0B1D35"/>
    </linearGradient>
    <linearGradient id="bldg1" x1="0" y1="0" x2="50" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a91bc"/>
      <stop offset="100%" stop-color="#0a5a78"/>
    </linearGradient>
    <linearGradient id="bldg2" x1="0" y1="0" x2="50" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9dc5"/>
      <stop offset="100%" stop-color="#0F7BA0"/>
    </linearGradient>
    <linearGradient id="bldg3" x1="0" y1="0" x2="50" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c75a0"/>
      <stop offset="100%" stop-color="#0a3d5c"/>
    </linearGradient>
    <clipPath id="b1c"><rect x="22" y="48" width="34" height="90" rx="3"/></clipPath>
    <clipPath id="b2c"><rect x="72" y="20" width="36" height="118" rx="3"/></clipPath>
    <clipPath id="b3c"><rect x="124" y="60" width="32" height="78" rx="3"/></clipPath>
  </defs>

  <!-- Background square with rounded corners -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>

  <!-- Left building -->
  <rect x="22" y="48" width="34" height="90" rx="3" fill="url(#bldg1)"/>
  <g clip-path="url(#b1c)" opacity="0.4">
    <rect x="10" y="60"  width="60" height="6" rx="1" fill="#0B1628"/>
    <rect x="10" y="72"  width="60" height="6" rx="1" fill="#0B1628"/>
    <rect x="10" y="84"  width="60" height="6" rx="1" fill="#0B1628"/>
    <rect x="10" y="96"  width="60" height="6" rx="1" fill="#0B1628"/>
    <rect x="10" y="108" width="60" height="6" rx="1" fill="#0B1628"/>
    <rect x="10" y="120" width="60" height="6" rx="1" fill="#0B1628"/>
  </g>

  <!-- Center building (tallest) -->
  <rect x="72" y="20" width="36" height="118" rx="3" fill="url(#bldg2)"/>
  <g clip-path="url(#b2c)" opacity="0.4">
    <rect x="60" y="34"  width="60" height="7" rx="1" fill="#060D1C"/>
    <rect x="60" y="47"  width="60" height="7" rx="1" fill="#060D1C"/>
    <rect x="60" y="60"  width="60" height="7" rx="1" fill="#060D1C"/>
    <rect x="60" y="73"  width="60" height="7" rx="1" fill="#060D1C"/>
    <rect x="60" y="86"  width="60" height="7" rx="1" fill="#060D1C"/>
    <rect x="60" y="99"  width="60" height="7" rx="1" fill="#060D1C"/>
    <rect x="60" y="112" width="60" height="7" rx="1" fill="#060D1C"/>
    <rect x="60" y="125" width="60" height="7" rx="1" fill="#060D1C"/>
  </g>

  <!-- Right building -->
  <rect x="124" y="60" width="32" height="78" rx="3" fill="url(#bldg3)"/>
  <g clip-path="url(#b3c)" opacity="0.4">
    <rect x="112" y="72"  width="56" height="6" rx="1" fill="#0B1628"/>
    <rect x="112" y="84"  width="56" height="6" rx="1" fill="#0B1628"/>
    <rect x="112" y="96"  width="56" height="6" rx="1" fill="#0B1628"/>
    <rect x="112" y="108" width="56" height="6" rx="1" fill="#0B1628"/>
    <rect x="112" y="120" width="56" height="6" rx="1" fill="#0B1628"/>
  </g>

  <!-- Ground line -->
  <rect x="14" y="138" width="152" height="3" rx="1.5" fill="#0F7BA0" opacity="0.4"/>

  <!-- Antenna on center -->
  <rect x="88.5" y="10" width="3" height="12" rx="1.5" fill="#0F7BA0" opacity="0.8"/>
  <circle cx="90" cy="9" r="3.5" fill="#0F7BA0"/>

  <!--
    SkylineIcon reproduced exactly from logo-brand.tsx mode="white"
    Original viewBox: 0 0 96 68
    Scale 1.55, translated to center in 180x180:
      scaled w = 96*1.55 = 148.8  → left margin = (180-148.8)/2 = 15.6 → ~16
      scaled h = 68*1.55 = 105.4  → top margin  = (180-105.4)/2 = 37.3 → ~37
  -->
  <g transform="translate(16 37) scale(1.55)">

    <!-- Ground line -->
    <rect x="0" y="60" width="96" height="4" rx="2"
          fill="rgba(255,255,255,0.9)" opacity="0.4"/>

    <!-- Left building -->
    <rect x="4"  y="20" width="12" height="40" rx="2.5"
          fill="rgba(255,255,255,0.9)"/>

    <!-- Second building (shorter) -->
    <rect x="20" y="38" width="9"  height="22" rx="2"
          fill="rgba(255,255,255,0.9)" opacity="0.7"/>

    <!-- Third building -->
    <rect x="33" y="28" width="11" height="32" rx="2.5"
          fill="rgba(255,255,255,0.9)"/>

    <!-- Center tall building -->
    <rect x="48" y="10" width="13" height="50" rx="2.5"
          fill="rgba(255,255,255,0.9)"/>

    <!-- Right-center building -->
    <rect x="65" y="30" width="11" height="30" rx="2.5"
          fill="rgba(255,255,255,0.9)"/>

    <!-- Right short building -->
    <rect x="80" y="40" width="9"  height="20" rx="2"
          fill="rgba(255,255,255,0.9)" opacity="0.7"/>

    <!-- Antenna stem -->
    <rect x="54" y="4" width="1.5" height="8" rx="0.75"
          fill="rgba(255,255,255,0.9)"/>

    <!-- Antenna dot -->
    <circle cx="54.75" cy="3.5" r="2"
            fill="rgba(255,255,255,0.9)"/>

    <!-- Windows (dark on white buildings) -->
    <rect x="7"  y="25" width="2.5" height="2" rx="0.5" fill="rgba(0,0,0,0.2)"/>
    <rect x="11" y="25" width="2.5" height="2" rx="0.5" fill="rgba(0,0,0,0.2)"/>
    <rect x="7"  y="30" width="2.5" height="2" rx="0.5" fill="rgba(0,0,0,0.2)"/>
    <rect x="11" y="30" width="2.5" height="2" rx="0.5" fill="rgba(0,0,0,0.2)"/>
    <rect x="51" y="15" width="2.5" height="2" rx="0.5" fill="rgba(0,0,0,0.2)"/>
    <rect x="55" y="15" width="2.5" height="2" rx="0.5" fill="rgba(0,0,0,0.2)"/>
    <rect x="51" y="21" width="2.5" height="2" rx="0.5" fill="rgba(0,0,0,0.2)"/>
    <rect x="55" y="21" width="2.5" height="2" rx="0.5" fill="rgba(0,0,0,0.2)"/>
  </g>
</svg>
