<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1628"/>
      <stop offset="100%" stop-color="#0d2a45"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="180" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0F7BA0"/>
      <stop offset="60%"  stop-color="#0d6d8e"/>
      <stop offset="100%" stop-color="#0F1C3F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="38" fill="url(#bg)"/>

  <!-- Skyline scaled to fit (original viewBox 96×68 → scaled ~1.55x, centered) -->
  <!-- translate(42, 50) scale(1.0) — buildings centered in 180×180 -->
  <g transform="translate(42 54) scale(1.0)">
    <!-- Base ground line -->
    <rect x="0"  y="60" width="96" height="4" rx="2" fill="url(#sky)" opacity="0.35"/>
    <!-- Buildings -->
    <rect x="4"  y="20" width="12" height="40" rx="2.5" fill="url(#sky)"/>
    <rect x="20" y="38" width="9"  height="22" rx="2"   fill="url(#sky)" opacity="0.75"/>
    <rect x="33" y="28" width="11" height="32" rx="2.5" fill="url(#sky)"/>
    <rect x="48" y="10" width="13" height="50" rx="2.5" fill="url(#sky)"/>
    <rect x="65" y="30" width="11" height="30" rx="2.5" fill="url(#sky)"/>
    <rect x="80" y="40" width="9"  height="20" rx="2"   fill="url(#sky)" opacity="0.75"/>
    <!-- Antenna -->
    <rect x="54"   y="4"  width="1.5" height="8"  rx="0.75" fill="url(#sky)"/>
    <circle cx="54.75" cy="3.5" r="2" fill="#0F7BA0"/>
    <!-- Windows -->
    <rect x="7"  y="25" width="2.5" height="2" rx="0.5" fill="rgba(255,255,255,0.55)"/>
    <rect x="11" y="25" width="2.5" height="2" rx="0.5" fill="rgba(255,255,255,0.55)"/>
    <rect x="7"  y="30" width="2.5" height="2" rx="0.5" fill="rgba(255,255,255,0.55)"/>
    <rect x="11" y="30" width="2.5" height="2" rx="0.5" fill="rgba(255,255,255,0.55)"/>
    <rect x="51" y="15" width="2.5" height="2" rx="0.5" fill="rgba(255,255,255,0.55)"/>
    <rect x="55" y="15" width="2.5" height="2" rx="0.5" fill="rgba(255,255,255,0.55)"/>
    <rect x="51" y="21" width="2.5" height="2" rx="0.5" fill="rgba(255,255,255,0.55)"/>
    <rect x="55" y="21" width="2.5" height="2" rx="0.5" fill="rgba(255,255,255,0.55)"/>
  </g>
</svg>
