<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1628"/>
      <stop offset="100%" stop-color="#0F7BA0"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="180" height="180" rx="38" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="180" height="90" rx="38" fill="url(#shine)"/>

  <!-- House body -->
  <rect x="46" y="98" width="88" height="56" rx="6" fill="white" opacity="0.95"/>

  <!-- Roof (triangle) -->
  <path d="M33 102 L90 44 L147 102 Z" fill="#0FAAD4" opacity="0.95"/>

  <!-- Roof outline cap -->
  <path d="M33 102 L90 44 L147 102" stroke="white" stroke-width="5" stroke-linejoin="round" stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Door -->
  <rect x="75" y="120" width="30" height="34" rx="5" fill="#0B1628" opacity="0.75"/>
  <!-- Door knob -->
  <circle cx="100" cy="138" r="3" fill="white" opacity="0.6"/>

  <!-- Left window -->
  <rect x="52" y="106" width="18" height="16" rx="3" fill="#0FAAD4" opacity="0.7"/>
  <!-- Right window -->
  <rect x="110" y="106" width="18" height="16" rx="3" fill="#0FAAD4" opacity="0.7"/>

  <!-- Chimney -->
  <rect x="112" y="60" width="12" height="26" rx="3" fill="#0FAAD4" opacity="0.8"/>
</svg>
